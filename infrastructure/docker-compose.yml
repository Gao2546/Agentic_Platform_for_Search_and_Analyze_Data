version: '3.8'

services:
  # 1. MinIO - Data Lake (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: agentic_minio
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Console Port
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    networks:
      - shared_net
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: agentic_minio_init
    depends_on:
      - minio
    networks:
      - shared_net
    volumes:
      # เชื่อมไฟล์ init-minio.sh จากเครื่องเรา เข้าไปไว้ใน Container
      - ./init-scripts/init-minio.sh:/init-minio.sh
    # สั่งรันไฟล์สคริปต์
    entrypoint: /bin/sh /init-minio.sh

  # 2. PostgreSQL with pgvector - Metadata & Vector Store
  postgres:
    image: ankane/pgvector:latest # Image ที่มี pgvector ติดตั้งมาให้แล้ว
    container_name: agentic_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: agentic_db
    networks:
      - shared_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infrastructure/init-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql # โหลด script สร้างตาราง
    restart: unless-stopped

  # 3. MongoDB - NoSQL Data Warehouse (Processed Data & AI Insights)
  mongodb:
    image: mongo:latest
    container_name: agentic_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    networks:
      - shared_net
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # 4. RabbitMQ - Message Broker (Streaming Pipeline)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: agentic_rabbitmq
    ports:
      - "5672:5672"   # Message broker port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    networks:
      - shared_net
    restart: unless-stopped

# 5. Airflow Init (รันครั้งแรกเพื่อสร้าง User และเตรียม Database ให้ Airflow)
  airflow-init:
    build: 
      context: ../
      dockerfile: data-pipeline/airflow/Dockerfile
    container_name: agentic_airflow_init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password123@postgres/agentic_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    depends_on:
      - postgres
    networks:
      - shared_net

  # 6. Airflow Webserver / API Server
  airflow-webserver:
    build: 
      context: ../
      dockerfile: data-pipeline/airflow/Dockerfile
    container_name: agentic_airflow_webserver
    restart: always
    depends_on:
      - postgres
      - airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password123@postgres/agentic_db
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_ASYNC=postgresql+asyncpg://admin:password123@postgres/agentic_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://agentic_airflow_webserver:8080/execution
      - AIRFLOW__WEBSERVER__SECRET_KEY=my_super_secret_key_for_webserver_12345
      - AIRFLOW__API_AUTH__JWT_SECRET=super_secret_jwt_key_for_airflow_3_agentic
      - AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX=True
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__WEBSERVER__WTF_CSRF_ENABLED=False
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
      - AIRFLOW_DAGS_CONFIG_DIR=/opt/airflow/config
      # - AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL=300
      # - AIRFLOW__DAG_PROCESSOR__MIN_FILE_PROCESS_INTERVAL=10
      # - AIRFLOW__DAG_PROCESSOR__BUNDLE_REFRESH_CHECK_INTERVAL=10
      - PYTHONPATH=/opt/airflow/spark-jobs:/opt/airflow/dags:/opt/agentic_core:$PYTHONPATH
    command: api-server
    ports:
      - "8080:8080"
    networks:
      - shared_net
    volumes:
      - ../data-pipeline/airflow/dags:/opt/airflow/dags
      - ../data-pipeline/airflow/config:/opt/airflow/config # แมปโฟลเดอร์ config เข้าไปใน Container เพื่อให้ Webserver อ่านไฟล์ JSON ได้
      - ../data-pipeline/spark-jobs:/opt/airflow/spark-jobs
      - ../agentic_core:/opt/agentic_core

  # 7. Airflow Scheduler 
  airflow-scheduler:
    build: 
      context: ../
      dockerfile: data-pipeline/airflow/Dockerfile
    container_name: agentic_airflow_scheduler
    # hostname: agentic_airflow_scheduler
    restart: always
    depends_on:
      - postgres
      - airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password123@postgres/agentic_db
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_ASYNC=postgresql+asyncpg://admin:password123@postgres/agentic_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://agentic_airflow_webserver:8080/execution
      - AIRFLOW__WEBSERVER__SECRET_KEY=my_super_secret_key_for_webserver_12345
      - AIRFLOW__API_AUTH__JWT_SECRET=super_secret_jwt_key_for_airflow_3_agentic
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
      - AIRFLOW_DAGS_CONFIG_DIR=/opt/airflow/config
      # - AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL=300
      # - AIRFLOW__DAG_PROCESSOR__MIN_FILE_PROCESS_INTERVAL=10
      # - AIRFLOW__DAG_PROCESSOR__BUNDLE_REFRESH_CHECK_INTERVAL=10
      - PYTHONPATH=/opt/airflow/spark-jobs:/opt/airflow/dags:/opt/agentic_core:$PYTHONPATH
    command: scheduler
    networks:
      - shared_net
    volumes:
      - ../data-pipeline/airflow/dags:/opt/airflow/dags
      - ../data-pipeline/airflow/config:/opt/airflow/config # แมปโฟลเดอร์ config เข้าไปใน Container เพื่อให้ Scheduler อ่านไฟล์ JSON ได้
      - ../data-pipeline/spark-jobs:/opt/airflow/spark-jobs
      - ../agentic_core:/opt/agentic_core

  # 8. Airflow DAG Processor (เพิ่มเข้ามาสำหรับ Airflow 3 โดยเฉพาะ)
  airflow-dag-processor:
    build: 
      context: ../
      dockerfile: data-pipeline/airflow/Dockerfile
    container_name: agentic_airflow_dag_processor
    restart: always
    depends_on:
      - postgres
      - airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password123@postgres/agentic_db
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_ASYNC=postgresql+asyncpg://admin:password123@postgres/agentic_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW__API_AUTH__JWT_SECRET=super_secret_jwt_key_for_airflow_3_agentic
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
      - AIRFLOW_DAGS_CONFIG_DIR=/opt/airflow/config
      - AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL=300
      - AIRFLOW__DAG_PROCESSOR__MIN_FILE_PROCESS_INTERVAL=30
      # - AIRFLOW__DAG_PROCESSOR__BUNDLE_REFRESH_CHECK_INTERVAL=10
      - PYTHONPATH=/opt/airflow/spark-jobs:/opt/airflow/dags:/opt/agentic_core:$PYTHONPATH
    command: dag-processor
    networks:
      - shared_net
    volumes:
      - ../data-pipeline/airflow/dags:/opt/airflow/dags
      - ../data-pipeline/airflow/config:/opt/airflow/config
      - ../data-pipeline/spark-jobs:/opt/airflow/spark-jobs
      - ../agentic_core:/opt/agentic_core

  # 9. Spark Master (ตัวควบคุม Cluster)
  spark-master:
    build:
      context: ../
      dockerfile: data-pipeline/spark-jobs/Dockerfile
    container_name: agentic_spark_master
    environment:
      - PYTHONPATH=/opt/airflow/spark-jobs:/opt/agentic_core:$PYTHONPATH
    # 📌 สั่งให้รันเป็น Master Node ด้วยคำสั่งของค่าย Apache โดยตรง
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080" # Spark Web UI
      - "7077:7077" # พอร์ตเชื่อมต่อ
    networks:
      - shared_net
    volumes:
      - ../data-pipeline/spark-jobs:/opt/airflow/spark-jobs
      - ../agentic_core:/opt/agentic_core

  # 10. Spark Worker (โหนดประมวลผล)
  spark-worker:
    build:
      context: ../
      dockerfile: data-pipeline/spark-jobs/Dockerfile
    container_name: agentic_spark_worker
    environment:
      - PYTHONPATH=/opt/airflow/spark-jobs:/opt/agentic_core:$PYTHONPATH
    # 📌 สั่งให้รันเป็น Worker Node และชี้เป้าไปที่ Master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - shared_net
    depends_on:
      - spark-master
    volumes:
      - ../data-pipeline/spark-jobs:/opt/airflow/spark-jobs
      - ../agentic_core:/opt/agentic_core

  # 11. Backend API Service
  backend-api:
    build:
      context: ../ # สำคัญมาก: ต้องใช้ Root path เป็น Context เพื่อให้เห็นโฟลเดอร์ agentic_core
      dockerfile: backend/Dockerfile
    container_name: agentic_backend
    ports:
      - "8000:8000"
    networks:
      - shared_net
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - POSTGRES_DSN=postgresql://admin:password123@postgres:5432/agentic_db
      - MONGO_URI=mongodb://admin:password123@mongodb:27017
      - AIRFLOW_API_URL=http://airflow-webserver:8080/api/v2
      - AIRFLOW_USER=admin
      - AIRFLOW_PASSWORD=admin
      - AIRFLOW_DAGS_CONFIG_DIR=/opt/airflow/config
      - PYTHONPATH=/app/agentic_core:$PYTHONPATH # เพิ่ม PYTHONPATH ให้ Backend มองเห็นโค้ดในโฟลเดอร์ต่างๆ
    depends_on:
      - postgres
      - mongodb
      - minio
    volumes:
      - ../agentic_core:/app/agentic_core # แมปโฟลเดอร์โค้ดหลักให้ Backend มองเห็น
      - ../backend/src:/app/backend/src # แมปโฟลเดอร์โค้ด Backend ให้เห็น
      - ../data-pipeline/airflow/dags:/opt/airflow/dags # แมปโฟลเดอร์ DAGs ให้ Backend มองเห็น (สำหรับ Trigger)
      - ../data-pipeline/airflow/config:/opt/airflow/config # แมปโฟลเดอร์ config ให้ Backend มองเห็น (สำหรับอ่าน schedules.json)

  # 12. Streaming Worker (ตัวรับข้อมูล)
  streaming-worker:
    build:
      context: ../
      dockerfile: streaming-pipeline/Dockerfile
    container_name: agentic_stream_worker
    command: ["python", "processors/fast_lane_worker.py"] # Override CMD เพื่อรัน Worker แทน Producer
    networks:
      - shared_net
    environment:
      - RABBITMQ_HOST=rabbitmq
      - BACKEND_TRIGGER_URL=http://backend-api:8000/api/v1/schedules/trigger
    depends_on:
      - rabbitmq
      - backend-api

  # 13. Mock Data Stream (จำลองราคาทองคำเข้า RabbitMQ)
  mock-price-stream:
    build:
      context: ../
      dockerfile: streaming-pipeline/Dockerfile
    container_name: agentic_mock_stream
    command: ["python", "ingestion/mock_price_stream.py"] # Override CMD เพื่อรัน Producer แทน Worker
    environment:
      - RABBITMQ_HOST=rabbitmq
    networks:
      - shared_net
    depends_on:
      - rabbitmq

  # 14. Frontend Web Application (React + Vite)
  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
    container_name: agentic_frontend
    ports:
      - "5173:5173"
    networks:
      - shared_net
    environment:
      # การให้ Frontend เรียก API ต้องใช้ localhost เนื่องจากโค้ดทำงานบน Browser ของ User
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend-api
    volumes:
      # แมปโฟลเดอร์ frontend เพื่อให้เวลาแก้โค้ด React แล้วหน้าเว็บอัปเดตทันที (Hot-Reloading)
      - ../frontend:/app
      # ป้องกันไม่ให้โฟลเดอร์ node_modules ในเครื่อง Local ทับโฟลเดอร์ใน Container
      - /app/node_modules

volumes:
  minio_data:
  postgres_data:
  mongodb_data:

networks:
  shared_net:
    external: true
    name: agentic_network  